{{ extends "global/Page.html" }}


{{ block content }}

    <p>
        <h5>
            Would you rather receive <b>{{ C.TODAY_FIXED_PRICE }}</b> today or <b>{{ dated_price }}</b> in 12 months?
        </h5>
    </p>

    <table class="table table-bordered text-center align-middle">
        <thead class="table-dark">
            <tr>
                <th>Payment today</th>
                <th>Payment in 12 months</th>
                <th>Your choice</th>
            </tr>
        </thead>

        <tr>
            <td>{{ C.TODAY_FIXED_PRICE }}</td>
            <td>{{ dated_price }}</td>
            <td>{{ formfields }}</td>
        </tr>
    </table>


    {{ next_button }}

{{ endblock }}
